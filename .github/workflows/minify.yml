name: Minify JSON

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'dump-readable.json'

jobs:
  minify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Minify dump-readable.json to dump.json
        run: jq -c . dump-readable.json > dump.json

      - name: Commit dump.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dump.json
          git diff --cached --quiet || git commit -m "chore: update dump.json"
          git push
